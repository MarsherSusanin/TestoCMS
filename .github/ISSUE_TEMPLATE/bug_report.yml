name: Bug report
description: Report a reproducible defect in TestoCMS
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Provide exact steps, sample content, routes, or commands.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: Release tag, branch, or commit SHA
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: PHP version, database driver, OS, web server, Docker or non-Docker
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Logs and evidence
      description: Paste stack traces, screenshots, or request/response details
