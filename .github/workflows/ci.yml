name: CI

on:
  push:
    branches:
      - main
      - 'release/*'
  pull_request:

jobs:
  php:
    name: PHP checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: dom, curl, libxml, mbstring, zip, pdo, pdo_sqlite, sqlite3, pdo_pgsql, pgsql, pdo_mysql, intl, gd, bcmath, exif
          coverage: none

      - name: Install PHP dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate --force
          php artisan optimize:clear

      - name: Lint
        run: composer lint

      - name: Test
        run: composer test

      - name: Validate Docker/VPS compose
        run: docker compose -f docker-compose.vps.yml config >/dev/null

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build assets
        run: npm run build
