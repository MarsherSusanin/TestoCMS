openapi: 3.1.0
info:
  title: TestoCMS API
  version: 1.0.0
  description: API-first CMS with Content API and Admin API
servers:
  - url: https://example.com
paths:
  /api/content/v1/posts:
    get:
      summary: List published posts
      parameters:
        - in: query
          name: locale
          schema:
            type: string
        - in: query
          name: page
          schema:
            type: integer
      responses:
        '200':
          description: Published posts
  /api/content/v1/posts/{slug}:
    get:
      summary: Get a published post by slug
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Published post
        '404':
          description: Not found
  /api/content/v1/pages:
    get:
      summary: List published pages
      responses:
        '200':
          description: Published pages
  /api/content/v1/categories:
    get:
      summary: List categories
      responses:
        '200':
          description: Categories
  /api/content/v1/assets:
    get:
      summary: List assets
      responses:
        '200':
          description: Assets
  /api/admin/v1/posts:
    get:
      summary: List posts (admin)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Posts
    post:
      summary: Create post (admin)
      security:
        - bearerAuth: []
      responses:
        '201':
          description: Created
  /api/admin/v1/posts/{post}/publish:
    post:
      summary: Publish post
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Published
  /api/admin/v1/pages:
    get:
      summary: List pages (admin)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Pages
    post:
      summary: Create page (admin)
      security:
        - bearerAuth: []
      responses:
        '201':
          description: Created
  /api/admin/v1/categories:
    get:
      summary: List categories (admin)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Categories
  /api/admin/v1/assets:
    post:
      summary: Upload asset
      security:
        - bearerAuth: []
      responses:
        '201':
          description: Created
  /api/admin/v1/llm/generate-post:
    post:
      summary: Generate post draft with LLM
      security:
        - bearerAuth: []
      responses:
        '201':
          description: Draft generated
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: PAT
